# Multi-resolution test: root + one child with braid
# Tests boundary coupling, prolongation, restriction, subcycling

# Shared physics
m          = 1.5
m_theta    = 0.0
eta        = 0.5
mu         = -41.345
kappa      = 50.0
mode       = 0
damp_width = 3.0
damp_rate  = 0.01
T          = 10.0
dt_factor  = 0.025

# Grid hierarchy: 2 domains
n_grids    = 2

# Root: coarse, covers whole space
grid.0.N       = 32
grid.0.L       = 20.0
grid.0.center  = 0,0,0
grid.0.parent  = -1
grid.0.snap_dt = 5.0
grid.0.init    = empty

# Child: fine, centered at origin, contains a braid
grid.1.N       = 64
grid.1.L       = 10.0
grid.1.center  = 0,0,0
grid.1.parent  = 0
grid.1.ghost   = 2
grid.1.snap_dt = 5.0
grid.1.init    = braid
grid.1.A       = 0.8
grid.1.A_bg    = 0.1
grid.1.R_tube  = 3.0
grid.1.ellip   = 0.3325

# Output
output     = /tmp/multi_test.sfa
precision  = f32
diag_dt    = 2.0
diag_file  = /tmp/multi_test_diag.tsv
