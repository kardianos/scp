# V56 smoke — damped relaxation + pion mass, testing whether damping
# absorbs the Derrick kinetic spike well enough to maintain winding
# past the t≈8 lattice-collapse threshold seen in the undamped baseline.
#
# Damping is applied for t<5 (initial relaxation), then disabled.

mass2 = 0.0
lambda = 5.0
v = 0.5
sigma_e2 = 0.0
skyrme_c4 = 5.0
skyrme_project = 1
m_pi = 0.0           # no pion mass — match the working baseline
damping = 0.1        # light continuous damping — suppresses lattice-scale
                     # ringing without significantly distorting dynamics
damping_T = 0.0      # damping always on

R_seed = 5.0

T = 15
dt_factor = 0.020
init = skyrme

cell_native = 1
sfa_output = 0
cell_iframe_interval = 0
output = smoke_skyrme_damped.sfa
diag_file = smoke_skyrme_damped_diag.tsv
snap_dt = 0.5
diag_dt = 0.25
