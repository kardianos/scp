# V56 smoke v2 — full stability stack on small 500k mesh, T=10
#
# This is the validation config for the stability rework. Compared to
# smoke_skyrme.cfg it:
#   - turns on hard S³ projection
#   - drops the σ-penalty (redundant)
#   - adds the pion-mass term (Compton scale R* ~ 2.0)
#   - boosts c4 from 0.05 to 5.0 so R* sits well above dx_min
#
# Success criteria:
#   - B_winding stays above 0.85 for the full 10 t-units
#   - E_total drift stays below 1%
#   - |q|² is exactly 1.0 to machine precision throughout

mass2 = 0.0
lambda = 5.0
v = 0.5
sigma_e2 = 0.0
skyrme_c4 = 5.0
skyrme_project = 1
m_pi = 0             # pion mass OFF for baseline test; Skyrme alone

R_seed = 5.0         # reproduces PROJECTION_RESULT.md scan_proj_strong setup:
                     # B held >0.85 for first 8 t-units before lattice collapse

T = 10
dt_factor = 0.020
init = skyrme

cell_native = 1
sfa_output = 0
cell_iframe_interval = 0
output = smoke_skyrme_v2.sfa
diag_file = smoke_skyrme_v2_diag.tsv
snap_dt = 0.5
diag_dt = 0.25
