# V56 smoke — Q-ball self-confinement test
#
# Tests that the 6-field SO(3)×SO(3) Q-ball ansatz holds as a self-
# reinforcing standing wave with no friction. Parameters back-calculated
# from the 1D ODE solver (qball_profile.c, see qball_w0.7.dat).
#
# Potential V = ½m² s − ¼a s² + ⅙b s³ + ½g·q²    (s = |φ|²+|θ|²)
#   Knob mapping into the existing config keys:
#     mass2     = m²       → 1.0
#     lambda    = a        → 2.0  (quartic coefficient — NOT a stiffness)
#     sigma_e2  = b        → 1.0  (sextic coefficient — NOT a σ-penalty)
#     skyrme_c4 = g        → 0.0  (cross-sector coupling, off for now)
#
# Ansatz at t=0:  φ_x(r) = R(r), φ_y(r) = 0  (rotated by ω as time evolves)
#                 ∂_t φ_y(r) = ω·R(r)         (Q^z_φ source)
#                 θ_z(r) = T(r), all other θ = 0  (static)
#
# Success criteria:
#   - φ and θ profiles persist within 1% of initial for t = 10 (no decay)
#   - φ_x, φ_y oscillate sinusoidally at ω = 0.7 (visible in cell history)
#   - E_total drift < 0.1% (no friction, exact symmetry)

init = qball
omega_seed = 0.7     # φ rotation frequency
omega_theta = 0.7    # θ rotation frequency (in (y,z) plane); 0 = static

mass2 = 1.0
lambda = 2.0          # → a (quartic in V)
sigma_e2 = 1.0        # → b (sextic in V); NOT the σ-constraint here
skyrme_c4 = 0.0       # → g (cross-sector); off for single-sector test
m_pi = 0.0
skyrme_project = 0    # no rotor projection (no rotor sphere here)

damping = 0.5         # always-on tangent damping — Q-charge is preserved,
damping_T = 0.0       # only the radial breathing mode is suppressed
damping_sector_size = 3  # tangent-only per 3-vec sector

T = 10
dt_factor = 0.020

cell_native = 1
sfa_output = 0
cell_iframe_interval = 0
output = smoke_qball_v2.sfa
diag_file = smoke_qball_v2_diag.tsv
snap_dt = 0.5
diag_dt = 0.1         # tighter diag — want to see ω-oscillation explicitly
