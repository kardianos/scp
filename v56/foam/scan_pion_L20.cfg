# V56 — projected strong Skyrme + pion mass on L=20
#
# m_pi sets a finite preferred Skyrmion size. We pick m_pi so that
# the pion Compton wavelength λ_π = 1/m_π corresponds to ~3 cells:
#   dx_min ≈ 0.44, target λ_π ≈ 1.3 → m_π ≈ 0.75 → m_pi2 ≈ 0.6
#
# Equilibrium Skyrmion radius is then a few λ_π, well above the
# lattice cutoff, preventing the t≈9 collapse seen without m_π.

mass2 = 0.0
lambda = 5.0
v = 0.5
sigma_e2 = 0.0
skyrme_c4 = 5.0
skyrme_project = 1
m_pi = 0.75
R_seed = 5.0

T = 50
dt_factor = 0.012        # tighter — pion mass adds high-frequency modes
init = skyrme

cell_native = 1
sfa_output = 0
cell_iframe_interval = 0
output = scan_pion_L20.sfa
diag_file = scan_pion_L20_diag.tsv
snap_dt = 1.0
diag_dt = 0.5
