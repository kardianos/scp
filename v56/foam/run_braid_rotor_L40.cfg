# V56 stage A — v55-style braid (rotor-component carriers)
#
# Carriers on M[0], M[1], M[2] (three timelike rotor components, basis
# e₄₁₀, e₄₂₀, e₄₃₀). These have negative metric → contribute −sum_sq to
# |M|²_bulk, so M[4] is INFLATED above v to compensate.
# Spatial components (M[5..7]) initially zero.
#
# This exercises the spinor part of the algebra. Different sign of g_kk
# means the Higgs drive pushes these components in the OPPOSITE direction
# than for spatial carriers.
mass2 = 0.0
lambda = 5.0
v = 0.5

A = 0.8
A_bg = 0.1
R_tube = 3.0
ellip = 0.3325
delta = 0.0,3.0005,4.4325

T = 50
dt_factor = 0.025
init = braid_rotor

cell_native = 1
sfa_output = 0
cell_iframe_interval = 20
cell_model_interval = 5
cell_delta_tol = 0.01
cell_omega = 1.5

output = v56_braid_rotor_L40.sfa
diag_file = v56_braid_rotor_L40_diag.tsv
snap_dt = 1.0
diag_dt = 1.0
