# V56 Skyrme hedgehog, L=40 — finer mesh test of the stability rework.
# T=25 keeps wall time around 40 min (~3.26M cells, 7× slower than smoke).
#
# Hypothesis: dx ≈ 0.32 vs 0.44 (smoke) → 36% finer resolution → the
# "Skyrmion eats lattice" collapse should be pushed from t≈8 (smoke)
# to t≈12-15 (this run). User suspects it'll fail in the same way.

mass2 = 0.0
lambda = 5.0
v = 0.5
sigma_e2 = 0.0
skyrme_c4 = 5.0
skyrme_project = 1
m_pi = 0.0
damping = 0.1        # light continuous damping (extends stability ~30%)
damping_T = 0.0

R_seed = 5.0

T = 25
dt_factor = 0.020

init = skyrme

cell_native = 1
sfa_output = 0
cell_iframe_interval = 20
cell_model_interval = 5
cell_delta_tol = 0.01
cell_omega = 1.0

output = v56_skyrme_L40_T25.sfa
diag_file = v56_skyrme_L40_T25_diag.tsv
snap_dt = 1.0
diag_dt = 0.5
