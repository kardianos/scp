# V56 stage A — Skyrme hedgehog at L=40
#
# Rotor-part hedgehog with winding number 1, on top of M[4] = v Higgs
# vacuum. The hedgehog is small-amplitude (A=0.2 << v=0.5) so the bulk
# norm stays close to v² and the topological structure rides on top.
#
# Stage A doesn't include the Skyrme stabilising 4th-derivative term,
# so we expect this to either (a) shrink to a point and dissolve into
# the vacuum, (b) stay metastable for some time, or (c) propagate a
# wake into the vacuum. Outcomes vs Stage C (with Skyrme term added)
# is the important comparison.

mass2 = 0.0
lambda = 5.0
v = 0.5

A = 0.2
R_seed = 5.0

T = 50
dt_factor = 0.025
init = skyrme

cell_native = 1
sfa_output = 0
cell_iframe_interval = 20
cell_model_interval = 5
cell_delta_tol = 0.01
cell_omega = 1.0

output = v56_skyrme_L40.sfa
diag_file = v56_skyrme_L40_diag.tsv
snap_dt = 1.0
diag_dt = 1.0
