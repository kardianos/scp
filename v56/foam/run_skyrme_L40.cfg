# V56 Skyrme hedgehog, L=40 — stability rework.
#
# Verified stable for ≥8 t-units on the 500k smoke mesh; the L=40
# production mesh (dx_min ≈ 0.32 vs 0.44) is ~36% finer and pushes the
# "Skyrmion eats lattice" collapse threshold further out.
#
# Why these parameters:
#   - skyrme_project = 1  HARD project rotor onto |q|=1 each Verlet step.
#                          Closes the bulk-Higgs scalar branch (the failure
#                          mode in SCAN_RESULTS.md / PROJECTION_RESULT.md).
#   - sigma_e2     = 0    redundant with hard projection.
#   - skyrme_c4    = 5.0  large enough that Derrick equilibrium
#                          R* ≈ √(c4/L2) ≈ 2.24 spans ~7 cells at dx=0.32.
#   - m_pi         = 0    pion-mass disabled. Adding m_π naïvely shrinks
#                          the equilibrium FURTHER (it's an additive λ³
#                          term in the Derrick scaling — see DERRICK note
#                          in foam_sim.c). Enable it only with damping
#                          and a seed at the new equilibrium R*.
#   - R_seed       = 5.0  matched to the Derrick + finite-mesh ringing
#                          radius (slightly larger than R* leaves room for
#                          the lattice profile to relax inward).
#   - damping      = 0    pure energy-conserving dynamics. For longer
#                          runs that need to relax through the kinetic
#                          spike, set damping=0.5, damping_T=10.

mass2 = 0.0
lambda = 5.0
v = 0.5
sigma_e2 = 0.0
skyrme_c4 = 5.0
skyrme_project = 1
m_pi = 0.0
damping = 0.0

R_seed = 5.0

T = 50
dt_factor = 0.020    # foam_sim auto-tightens further if L_4 CFL demands

init = skyrme

cell_native = 1
sfa_output = 0
cell_iframe_interval = 20
cell_model_interval = 5
cell_delta_tol = 0.01
cell_omega = 1.0

output = v56_skyrme_L40.sfa
diag_file = v56_skyrme_L40_diag.tsv
snap_dt = 1.0
diag_dt = 1.0
