# EM wave propagation test — transverse θ_x wave packet in +z
# Tests photon-like propagation in the Cosserat theory

N = 128
L = 30
T = 50
dt_factor = 0.025

# Standard physics
m = 1.5
m_theta = 0
eta = 0.5
mu = -41.345
kappa = 50.0

# V50/C4 terms (off for clean wave test first)
alpha_cs = 0.0
beta_h = 0.0
kappa_h = 0.0

# Init from seed
init = sfa
init_sfa = v50/em_wave/seed.sfa

# Absorbing BC to prevent reflections
bc_type = 0
damp_width = 5.0
damp_rate = 0.05

# Output
output = v50/em_wave/em_wave.sfa
diag_file = v50/em_wave/diag.tsv
precision = f32
snap_dt = 1.0
diag_dt = 0.5
