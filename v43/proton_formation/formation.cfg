# Proton formation study — watch 3 braids → compact proton
# Snapshot every ~10 timesteps to capture the convergence dynamics
#
# Run: OMP_NUM_THREADS=8 scp_sim formation.cfg

N = 192
L = 25
T = 20

# Physics — standard Cosserat
m = 1.5
m_theta = 0
eta = 0.5
mu = -41.345
kappa = 50

# Init from seed
init = sfa
init_sfa = uud_seed.sfa
init_frame = -1

# Fine output — capture formation dynamics
snap_dt = 0.065      # ~15 snaps per breathing period (4.4t)
diag_dt = 0.065      # match snap cadence
output = proton_formation.sfa
diag_file = proton_formation_diag.tsv
precision = f16      # keep total size manageable (~26 GB)

# Absorbing boundary — let radiation escape
damp_width = 3.0
damp_rate = 0.02
