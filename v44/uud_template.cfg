# V44 — Isolated UUD Proton from pre-converged template
# Template-seeded run for clean energetics comparison

N          = 512
L          = 100.0
T          = 500.0
dt_factor  = 0.025

# Physics — standard Cosserat
m          = 1.5
m_theta    = 0.0
eta        = 0.5
mu         = -41.345
kappa      = 50.0
mode       = 0

# Init from converged template (64^3 proton, stamped into 512^3 grid)
init       = template
init_sfa   = proton_template.sfa

# Absorbing boundary — matches V42
damp_width = 10.0
damp_rate  = 0.005

# Output
output     = uud_template.sfa
precision  = f32
snap_dt    = 100.0
diag_dt    = 1.0
diag_file  = uud_template_diag.tsv
