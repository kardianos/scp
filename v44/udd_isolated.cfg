# V44 — Isolated UDD Neutron (mass defect + degradation study)
# Matches V42 deuterium grid: N=512, L=100, same BC
# Extended to T=1000 for F18 neutron degradation
#
# Purpose: F24 mass defect (T<=500), F18 degradation (T=500-1000),
#          charge measurement, template extraction

N          = 512
L          = 100.0
T          = 1000.0
dt_factor  = 0.025

# Physics — standard Cosserat (matches V42 exactly)
m          = 1.5
m_theta    = 0.0
eta        = 0.5
mu         = -41.345
kappa      = 50.0
mode       = 0

# Init from seed
init       = sfa
init_sfa   = udd_seed.sfa
init_frame = -1

# Absorbing boundary — matches V42
damp_width = 10.0
damp_rate  = 0.005

# Output — more frequent snapshots for degradation analysis
output     = udd_isolated.sfa
precision  = f32
snap_dt    = 100.0
diag_dt    = 1.0
diag_file  = udd_isolated_diag.tsv
