# V44 — Isolated UUD Proton (mass defect baseline)
# Matches V42 deuterium grid: N=512, L=100, T=500, same BC
#
# Purpose: F24 mass defect, charge measurement
# Compare E_pot time-average with V42 deuterium

N          = 512
L          = 100.0
T          = 500.0
dt_factor  = 0.025

# Physics — standard Cosserat (matches V42 exactly)
m          = 1.5
m_theta    = 0.0
eta        = 0.5
mu         = -41.345
kappa      = 50.0
mode       = 0

# Init from seed
init       = sfa
init_sfa   = uud_seed.sfa
init_frame = -1

# Absorbing boundary — matches V42
damp_width = 10.0
damp_rate  = 0.005

# Output
output     = uud_isolated.sfa
precision  = f32
snap_dt    = 100.0
diag_dt    = 1.0
diag_file  = uud_isolated_diag.tsv
