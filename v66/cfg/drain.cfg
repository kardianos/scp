# v66 SPEC §9e — eta=0.5 Theta-radiation drain measurement (the science run)
# Same seed as persist.cfg but eta=0.5, T=200, diag_dt=1.0. Analysis (not
# pass/fail): dQ_phi/dt, dE/dt, Q_theta(t), charge half-life, drain ∝ eta²
# (rerun with -eta 0.25 CLI override for the leading-order check).
# snap_dt=20 → 10 frames ≈ 250 MB at N=64 f32/24-col; /space per SPEC §9.
N=64
L=15
T=200
dt_factor=0.025
complex_phi=1
init=qball
qball_profile=v66/results/profile_omega1.3900.txt
qball_omega=1.39
eta=0.5
bc_type=0
damp_width=3.0
damp_rate=0.01
diag_dt=1.0
snap_dt=20
diag_file=v66/results/drain_diag.tsv
output=/space/scp/v66/drain.sfa
precision=f32
