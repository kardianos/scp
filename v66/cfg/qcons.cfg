# v66 SPEC §9c — Q-conservation (integrator drift floor), eta=0, periodic BC
# PASS: max_t |Q_total(t)-Q_total(0)|/|Q_total(0)| < 1e-6; Q_total(0) within
# 10% of radial-solver Q≈482. Also record E_total drift (Verlet floor).
# NOTE (deviation from SPEC §9c text): snap_dt=1000 (not 0) — snap_dt=0 means
# "snapshot every step" in the kernel (1.3 GB/10 t.u. at N=64), not "off".
N=64
L=15
T=20
dt_factor=0.025
complex_phi=1
init=qball
qball_profile=v66/results/profile_omega1.3900.txt
qball_omega=1.39
eta=0
bc_type=2
diag_dt=0.5
snap_dt=1000
diag_file=v66/results/qcons_diag.tsv
output=/tmp/qcons.sfa
precision=f32
