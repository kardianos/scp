# V54 Vacuum Pairs — Test 2: Unstable vacuum (A > A_crit)
# A_crit = sqrt(2*m_theta^2 / (3*sigma_cross)) = sqrt(2*1.0 / (3*0.5)) = 1.155
# Using A=1.5 > 1.155 → theta should grow, then saturate
# gamma_max = sqrt(sigma_cross * (3/2) * A^2 - m_theta^2) = sqrt(0.6875) = 0.829
# tau_growth = 1/gamma = 1.21 time units
# theta_sat = sqrt((sigma_cross*(3/2)*A^2 - m_theta^2)/lambda_self) = 0.829

N = 96
L = 12
T = 100
dt_factor = 0.025

# Physics — standard SCP base
m = 1.5
mu = -41.345
kappa = 50
eta = 0.5

# Vacuum pair parameters
m_theta = 1.0
sigma_cross = 0.5
lambda_self = 1.0

# Init — oscillon ABOVE critical amplitude
init = oscillon
A = 1.5
sigma = 3.0
delta = 0.0,1.047,2.094

# BC — periodic
bc_type = 2

# Output
output = test_unstable_output.sfa
diag_file = test_unstable_diag.tsv
precision = f32
snap_dt = 5.0
diag_dt = 1.0
