# testG confining cross-potential — the stable configuration
# Matches the CUDA kernel test that produced stable theta + sustained phi
# sigma_cross=20, lambda_self=10 (confining signs in force computation)

N = 64
L = 15
T = 200
dt_factor = 0.025

# Physics — high amplitude regime
m = 3.0
mu = -90
kappa = 50
eta = 0.3

# Confining potentials (the stable system)
sigma_cross = 20
lambda_self = 10

# Init — Lissajous 3-axis seed
init = braid
A = 1.5
A_bg = 0.1
sigma = 3.0
delta = 0.0,1.047,1.047

# BC: absorb for 30 TU, then periodic
bc_type = 0
damp_width = 3.0
damp_rate = 0.01
bc_switch_time = 30

# Output
output = testG_confine.sfa
diag_file = testG_confine.tsv
precision = f32
snap_dt = 10.0
diag_dt = 2.0
