# V51 Experiment 1: Single proton in density gradient
# Tests gravitational drift with V50/C4 equations
# Expect: proton drifts toward low density (gravity)

N = 384
L = 100
T = 500
dt_factor = 0.025

# V50/C4 physics
m = 1.5
m_theta = 0
eta = 0.5
mu = -41.345
kappa = 50.0
alpha_cs = 0.1
beta_h = 0.5

# Gradient boundary: high density left, low density right
bc_type = 1
gradient_A_high = 0.15
gradient_A_low = 0.05
gradient_margin = 3

# Template init: place a pre-converged proton at center
init = template
init_sfa = v43/proton_formation/proton_template.sfa
A_bg = 0.1

# Output
output = /space/scp/v51/proton_gradient.sfa
diag_file = v51/proton_gradient/diag.tsv
precision = f32
snap_dt = 5.0
diag_dt = 1.0
