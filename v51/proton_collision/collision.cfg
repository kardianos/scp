# V51 Experiment 2: Two-proton collision
# Two UUD protons approaching each other along x-axis
# Tests: do they merge, bounce, or bind?

N = 384
L = 50
T = 300
dt_factor = 0.025

# V50/C4 physics
m = 1.5
m_theta = 0
eta = 0.5
mu = -41.345
kappa = 50.0
alpha_cs = 0.1
beta_h = 0.5

# Absorbing BC — let radiation escape
bc_type = 0
damp_width = 5.0
damp_rate = 0.02

# Init from seed (generated by gen_collision.c)
init = sfa
init_sfa = /space/scp/v51/seed_collision.sfa
A_bg = 0.1

# Output
output = /space/scp/v51/proton_collision.sfa
diag_file = v51/proton_collision/diag.tsv
precision = f32
snap_dt = 5.0
diag_dt = 1.0
